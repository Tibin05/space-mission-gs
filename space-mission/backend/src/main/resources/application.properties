# ============================================================
# BANCO DE DADOS H2 - MODO FILE (dados persistem no disco)
# ============================================================

# Caminho do arquivo do banco (cria pasta ./data com o arquivo spacemission.mv.db)
spring.datasource.url=jdbc:h2:file:./data/spacemission
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Atualiza a estrutura do banco automaticamente ao iniciar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Console web do H2 (acesse http://localhost:8080/h2-console para ver o banco)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Porta da API
server.port=8080

# Permite que o app React Native (em outro endereço) acesse a API
spring.web.cors.allowed-origins=*
